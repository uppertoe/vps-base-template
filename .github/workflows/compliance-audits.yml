name: Compliance Audits

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  compliance-audits:
    name: OpenSCAP and Docker Audits
    runs-on: ubuntu-24.04
    env:
      ANSIBLE_HOME: /tmp/ansible
      XDG_CACHE_HOME: /tmp/.cache
      ANSIBLE_LOCAL_TEMP: /tmp/ansible/tmp
      ANSIBLE_REMOTE_TEMP: /tmp/ansible/tmp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          python -m pip install -r requirements.txt
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run first-run playbook and audits
        run: bash scripts/run-ci-compliance-audits.sh

      - name: Render Pages site
        run: bash scripts/render-compliance-pages.sh

      - name: Upload compliance reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports
          path: reports
          if-no-files-found: error

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: compliance-site

  deploy-pages:
    name: Publish Compliance Reports
    if: github.ref == 'refs/heads/main'
    needs: compliance-audits
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
