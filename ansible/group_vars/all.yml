---
# -----------------------------------------------------------------------------
# Deploy user
# -----------------------------------------------------------------------------
deploy_user: deploy

# Path to the public key on your LOCAL machine that will be added to the
# server's authorized_keys. By default this is derived from the same key set in
# ansible_ssh_private_key_file, so bootstrap and day-to-day SSH use stay aligned.
# Override per-server in inventory host_vars if needed (e.g. for a shared team
# key).
deploy_user_public_key: "{{ lookup('file', ((ansible_ssh_private_key_file | default('~/.ssh/id_ed25519')) ~ '.pub')) }}"

# -----------------------------------------------------------------------------
# Server basics
# -----------------------------------------------------------------------------
server_timezone: UTC

# -----------------------------------------------------------------------------
# SSH hardening (passed to devsec.hardening.ssh_hardening)
# See: https://github.com/dev-sec/ansible-collection-hardening
# -----------------------------------------------------------------------------
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_challenge_response_authentication: "no"
ssh_gss_api_authentication: "no"
ssh_kerberos_authentication: "no"
ssh_x11_forwarding: false
ssh_max_auth_retries: 3
ssh_max_sessions: 2
ssh_client_alive_interval: 300
ssh_client_alive_count: 3
ssh_login_grace_time: 60
ssh_allow_tcp_forwarding: "no"
ssh_print_motd: false
ssh_print_last_log: true
sshd_log_level: INFO
ssh_banner: true
ssh_banner_path: /etc/issue.net
ssh_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
  - hmac-sha2-512
  - hmac-sha2-256
# Only allow the deploy user to connect via SSH
ssh_allow_users: "{{ deploy_user }}"

# -----------------------------------------------------------------------------
# OS hardening (passed to devsec.hardening.os_hardening)
# Skipped automatically when running inside Docker (Molecule tests)
# -----------------------------------------------------------------------------
os_security_kernel_enable_module_loading: true
os_security_suid_sgid_enforce: true
os_auth_retries: 4
os_auth_lockout_time: 900
os_auth_pw_remember: 24
os_security_auto_logout: 900
os_auth_pam_passwdqc_enable: false
os_auditd_enabled: true
lock_root_password: true

# -----------------------------------------------------------------------------
# Baseline hardening (custom repository defaults)
# -----------------------------------------------------------------------------
baseline_enable_aide: true
baseline_enable_apparmor_boot: true
baseline_enable_journald_syslog_forwarding: true
baseline_password_inactive_days: 30
baseline_shell_umask: "027"
baseline_faillock_deny: 4
baseline_faillock_unlock_time: 900
baseline_faillock_fail_interval: 900
baseline_disabled_kernel_modules:
  - cramfs
  - freevxfs
  - hfs
  - hfsplus
  - jffs2
  - usb-storage
baseline_timesyncd_ntp_servers:
  - 0.ubuntu.pool.ntp.org
  - 1.ubuntu.pool.ntp.org
  - 2.ubuntu.pool.ntp.org
  - 3.ubuntu.pool.ntp.org
baseline_timesyncd_fallback_ntp_servers:
  - ntp.ubuntu.com

# -----------------------------------------------------------------------------
# Firewall (ufw)
# -----------------------------------------------------------------------------
firewall_allowed_tcp_ports:
  - "22"   # SSH
  - "80"   # HTTP
  - "443"  # HTTPS
firewall_allowed_udp_ports:
  - "443"  # HTTP/3
