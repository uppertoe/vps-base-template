---
# Path on the control host (server repo) containing backup config.
# The role copies config.env and services/*.env from here to the VPS.
backup_config_src: "{{ playbook_dir }}/../backup"

# Where config lands on the VPS.
backup_config_dest: /etc/restic

# Where the backup and restore scripts are installed.
backup_scripts_dest: /opt/backup

# When to run scheduled backups (systemd OnCalendar format, UTC).
backup_schedule: "hourly"

# When to run repository verification (restic check + snapshot listing).
# Keep this less frequent than backups and offset from the top-of-hour backup
# schedule so weekly prune/check work is less likely to overlap.
backup_verify_schedule: "Sun *-*-* 03:17:00"

# Restic version to install from the official GitHub releases.
# Check https://github.com/restic/restic/releases for the latest.
backup_restic_version: "0.17.3"
