---
- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Install baseline hardening packages
  ansible.builtin.apt:
    name:
      - apparmor-utils
      - libpam-pwquality
    state: present
    update_cache: true

- name: Remove packages we do not need on a minimal VPS
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    purge: true
    autoremove: true
  loop:
    - ftp
    - tnftp
    - telnet
    - inetutils-telnet
    - rsync
    - apport
  when: item in ansible_facts.packages

- name: Remove custom PAM profiles from earlier scaffold revisions
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/pam-configs/vps-pwquality
    - /usr/share/pam-configs/vps-pwhistory
    - /usr/share/pam-configs/vps-faillock

- name: Apply PAM profile changes
  ansible.builtin.command: pam-auth-update --package
  environment:
    DEBIAN_FRONTEND: noninteractive
  changed_when: true

- name: Configure faillock policy
  ansible.builtin.copy:
    dest: /etc/security/faillock.conf
    mode: "0644"
    content: |
      deny = {{ baseline_faillock_deny }}
      fail_interval = {{ baseline_faillock_fail_interval }}
      unlock_time = {{ baseline_faillock_unlock_time }}

- name: Remove duplicate pam_faillock lines from common-auth
  ansible.builtin.replace:
    path: /etc/pam.d/common-auth
    regexp: '^(auth\s+(required|\[default=die\])\s+pam_faillock\.so[^\n]*\n)+'
    replace: ''

- name: Insert pam_faillock lines into common-auth
  ansible.builtin.blockinfile:
    path: /etc/pam.d/common-auth
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold faillock"
    insertbefore: '^auth\s+\[success=2 default=ignore\]\s+pam_unix\.so'
    block: |
      auth required pam_faillock.so preauth silent audit deny={{ baseline_faillock_deny }} fail_interval={{ baseline_faillock_fail_interval }} unlock_time={{ baseline_faillock_unlock_time }}

- name: Insert pam_faillock authfail line after pam_unix in common-auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-auth
    insertafter: '^auth\s+\[success=2 default=ignore\]\s+pam_unix\.so'
    line: "auth [default=die] pam_faillock.so authfail audit deny={{ baseline_faillock_deny }} fail_interval={{ baseline_faillock_fail_interval }} unlock_time={{ baseline_faillock_unlock_time }}"
    state: present

- name: Remove duplicate pam_faillock lines from common-account
  ansible.builtin.replace:
    path: /etc/pam.d/common-account
    regexp: '^(account\s+required\s+pam_faillock\.so[^\n]*\n)+'
    replace: ''

- name: Insert pam_faillock line into common-account
  ansible.builtin.blockinfile:
    path: /etc/pam.d/common-account
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold faillock"
    insertbefore: '^account\s+\[success=1 new_authtok_reqd=done default=ignore\]\s+pam_unix\.so'
    block: |
      account required pam_faillock.so

- name: Configure pwquality policy in main config
  ansible.builtin.blockinfile:
    path: /etc/security/pwquality.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold pwquality"
    block: |
      enforcing = 1
      enforce_for_root
      minlen = 14
      minclass = 4
      difok = 2
      dictcheck = 1
      dcredit = -1
      ucredit = -1
      lcredit = -1
      ocredit = -1
      maxrepeat = 3
      maxsequence = 3

- name: Remove duplicate pam_pwquality lines from common-password
  ansible.builtin.replace:
    path: /etc/pam.d/common-password
    regexp: '^password\s+requisite\s+pam_pwquality\.so[^\n]*\n'
    replace: ''

- name: Remove duplicate pam_pwhistory lines from common-password
  ansible.builtin.replace:
    path: /etc/pam.d/common-password
    regexp: '^password\s+requisite\s+pam_pwhistory\.so[^\n]*\n'
    replace: ''

- name: Insert pwquality and pwhistory lines into common-password
  ansible.builtin.blockinfile:
    path: /etc/pam.d/common-password
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold password policy"
    insertbefore: '^password\s+\[success=1 default=ignore\]\s+pam_unix\.so'
    block: |
      password requisite pam_pwquality.so retry=3 enforce_for_root minlen=14 minclass=4 difok=2 dictcheck=1 dcredit=-1 ucredit=-1 lcredit=-1 ocredit=-1 maxrepeat=3 maxsequence=3
      password requisite pam_pwhistory.so remember={{ os_auth_pw_remember }} use_authtok enforce_for_root

- name: Set default inactive password lock for new users
  ansible.builtin.lineinfile:
    path: /etc/default/useradd
    regexp: '^INACTIVE='
    line: "INACTIVE={{ baseline_password_inactive_days }}"
    create: true
    mode: "0644"

- name: Set restrictive umask in profile.d
  ansible.builtin.copy:
    dest: /etc/profile.d/99-vps-scaffold-session.sh
    mode: "0644"
    content: |
      umask {{ baseline_shell_umask }}

- name: Configure TMOUT in profile.d using benchmark-compatible format
  ansible.builtin.copy:
    dest: /etc/profile.d/tmout.sh
    mode: "0644"
    content: |
      TMOUT={{ os_security_auto_logout }}
      readonly TMOUT
      export TMOUT

- name: Ensure /etc/profile enforces umask
  ansible.builtin.blockinfile:
    path: /etc/profile
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold umask"
    block: |
      umask {{ baseline_shell_umask }}

- name: Ensure /etc/bash.bashrc enforces umask
  ansible.builtin.blockinfile:
    path: /etc/bash.bashrc
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold umask"
    block: |
      umask {{ baseline_shell_umask }}

- name: Remove legacy TMOUT block from /etc/profile
  ansible.builtin.blockinfile:
    path: /etc/profile
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold session hardening"
    state: absent

- name: Remove legacy TMOUT block from /etc/bash.bashrc
  ansible.builtin.blockinfile:
    path: /etc/bash.bashrc
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold session hardening"
    state: absent

- name: Detect crontab group when present
  ansible.builtin.getent:
    database: group
    key: crontab
  register: crontab_group
  failed_when: false

- name: Ensure at.allow exists
  ansible.builtin.copy:
    dest: /etc/at.allow
    content: "root\n"
    owner: root
    group: root
    mode: "0640"

- name: Ensure cron.allow exists
  ansible.builtin.copy:
    dest: /etc/cron.allow
    content: "root\n"
    owner: root
    group: "{{ 'crontab' if crontab_group.ansible_facts.getent_group is defined else 'root' }}"
    mode: "0640"

- name: Configure sudo logging
  ansible.builtin.copy:
    dest: /etc/sudoers.d/01-vps-scaffold-logging
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
    content: |
      Defaults logfile="/var/log/sudo.log"
      Defaults use_pty
      Defaults timestamp_timeout=0

- name: Remove timesyncd drop-in from earlier scaffold revisions
  ansible.builtin.file:
    path: /etc/systemd/timesyncd.conf.d/99-vps-scaffold.conf
    state: absent

- name: Configure systemd-timesyncd NTP servers in main config
  ansible.builtin.blockinfile:
    path: /etc/systemd/timesyncd.conf
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold timesyncd"
    insertafter: '^\[Time\]'
    block: |
      NTP={{ baseline_timesyncd_ntp_servers | join(' ') }}
      FallbackNTP={{ baseline_timesyncd_fallback_ntp_servers | join(' ') }}

- name: Configure strong SSH MACs in a dedicated drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-vps-scaffold-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      MACs {{ ssh_macs | join(',') }}

- name: Enable and start systemd-timesyncd on real hosts
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']
