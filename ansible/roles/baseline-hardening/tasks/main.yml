---
- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Install baseline hardening packages
  ansible.builtin.apt:
    name:
      - aide
      - auditd
      - apparmor-utils
      - libpam-pwquality
      - rsyslog
    state: present
    update_cache: true

- name: Remove packages we do not need on a minimal VPS
  ansible.builtin.apt:
    name: "{{ item }}"
    state: absent
    purge: true
    autoremove: true
  loop:
    - ftp
    - tnftp
    - telnet
    - inetutils-telnet
    - rsync
    - apport
  when: item in ansible_facts.packages

- name: Apply authentication and password policy
  block:
    - name: Configure faillock policy
      ansible.builtin.copy:
        dest: /etc/security/faillock.conf
        mode: "0644"
        content: |
          deny = {{ baseline_faillock_deny }}
          fail_interval = {{ baseline_faillock_fail_interval }}
          unlock_time = {{ baseline_faillock_unlock_time }}

    - name: Remove nullok from pam_unix auth rules
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '\snullok\b'
        replace: ''
      loop:
        - /etc/pam.d/common-auth
        - /etc/pam.d/common-password

    - name: Ensure pam_faillock preauth line is present before pam_unix
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-auth
        regexp: '^auth required pam_faillock\.so preauth silent audit$'
        line: 'auth required pam_faillock.so preauth silent audit'
        insertbefore: '^auth\s+\[success=2 default=ignore\]\s+pam_unix\.so'

    - name: Ensure pam_faillock authfail line is present after pam_unix
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-auth
        regexp: '^auth \[default=die\] pam_faillock\.so authfail audit$'
        line: 'auth [default=die] pam_faillock.so authfail audit'
        insertafter: '^auth\s+\[success=2 default=ignore\]\s+pam_unix\.so'

    - name: Ensure pam_faillock account line is present
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-account
        regexp: '^account required pam_faillock\.so$'
        line: 'account required pam_faillock.so'
        insertbefore: '^account\s+\[success=1 new_authtok_reqd=done default=ignore\]\s+pam_unix\.so'

    - name: Configure pwquality policy in main config
      ansible.builtin.blockinfile:
        path: /etc/security/pwquality.conf
        marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold pwquality"
        block: |
          enforcing = 1
          enforce_for_root
          minlen = 14
          minclass = 4
          difok = 2
          dictcheck = 1
          dcredit = -1
          ucredit = -1
          lcredit = -1
          ocredit = -1
          maxrepeat = 3
          maxsequence = 3

    - name: Ensure pam_pwquality line is present
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-password
        regexp: '^password requisite pam_pwquality\.so retry=3 enforce_for_root minlen=14 minclass=4 difok=2 dictcheck=1 dcredit=-1 ucredit=-1 lcredit=-1 ocredit=-1 maxrepeat=3 maxsequence=3$'
        line: 'password requisite pam_pwquality.so retry=3 enforce_for_root minlen=14 minclass=4 difok=2 dictcheck=1 dcredit=-1 ucredit=-1 lcredit=-1 ocredit=-1 maxrepeat=3 maxsequence=3'
        insertbefore: '^password\s+\[success=1 default=ignore\]\s+pam_unix\.so'

    - name: Ensure pam_pwhistory line is present
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-password
        regexp: '^password requisite pam_pwhistory\.so remember={{ os_auth_pw_remember }} use_authtok enforce_for_root$'
        line: 'password requisite pam_pwhistory.so remember={{ os_auth_pw_remember }} use_authtok enforce_for_root'
        insertbefore: '^password\s+\[success=1 default=ignore\]\s+pam_unix\.so'

- name: Apply account and session policy
  block:
    - name: Ensure dedicated su-restriction group exists and is empty
      ansible.builtin.group:
        name: sugroup
        state: present

    - name: Restrict su to the dedicated pam_wheel group
      ansible.builtin.lineinfile:
        path: /etc/pam.d/su
        regexp: '^auth\s+required\s+pam_wheel\.so\b.*$'
        line: 'auth required pam_wheel.so use_uid group=sugroup'
        insertafter: '^auth\s+sufficient\s+pam_rootok\.so'

- name: Set default inactive password lock for new users
  ansible.builtin.lineinfile:
    path: /etc/default/useradd
    regexp: '^INACTIVE='
    line: "INACTIVE={{ baseline_password_inactive_days }}"
    create: true
    mode: "0644"

- name: Set restrictive umask in profile.d
  ansible.builtin.copy:
    dest: /etc/profile.d/99-vps-scaffold-session.sh
    mode: "0644"
    content: |
      umask {{ baseline_shell_umask }}

- name: Configure TMOUT in profile.d using benchmark-compatible format
  ansible.builtin.copy:
    dest: /etc/profile.d/tmout.sh
    mode: "0644"
    content: |
      TMOUT={{ os_security_auto_logout }}
      readonly TMOUT
      export TMOUT

- name: Ensure /etc/profile enforces umask
  ansible.builtin.blockinfile:
    path: /etc/profile
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold umask"
    block: |
      umask {{ baseline_shell_umask }}

- name: Ensure /etc/bash.bashrc enforces umask
  ansible.builtin.blockinfile:
    path: /etc/bash.bashrc
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold umask"
    block: |
      umask {{ baseline_shell_umask }}

- name: Restrict interactive user initialization file permissions
  ansible.builtin.shell: |
    set -eu
    while IFS=: read -r _ _ _ _ _ home shell; do
      case "$shell" in
        */nologin|*/false|"")
          continue
          ;;
      esac
      [ -d "$home" ] || continue
      find "$home" -maxdepth 1 -type f \
        \( -name '.bash_profile' -o -name '.bash_login' -o -name '.profile' -o -name '.bashrc' -o -name '.zprofile' -o -name '.zshrc' -o -name '.kshrc' -o -name '.cshrc' \) \
        -perm /037 -print0
    done < /etc/passwd | while IFS= read -r -d '' file; do
      chmod u=rwX,g=r,o= "$file"
      printf '%s\n' "$file"
    done
  args:
    executable: /bin/bash
  register: baseline_init_file_permissions
  changed_when: baseline_init_file_permissions.stdout != ""

- name: Detect crontab group when present
  ansible.builtin.getent:
    database: group
    key: crontab
  register: crontab_group
  failed_when: false

- name: Ensure at.allow exists
  ansible.builtin.copy:
    dest: /etc/at.allow
    content: "root\n"
    owner: root
    group: root
    mode: "0640"

- name: Ensure cron.allow exists
  ansible.builtin.copy:
    dest: /etc/cron.allow
    content: "root\n"
    owner: root
    group: "{{ 'crontab' if crontab_group.ansible_facts.getent_group is defined else 'root' }}"
    mode: "0640"

- name: Configure sudo logging
  ansible.builtin.copy:
    dest: /etc/sudoers.d/01-vps-scaffold-logging
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
    content: |
      Defaults logfile="/var/log/sudo.log"
      Defaults use_pty
      Defaults timestamp_timeout=0

- name: Create journald drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure journald to forward logs to rsyslog
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/99-vps-scaffold-forwarding.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Journal]
      ForwardToSyslog=yes
  notify:
    - Restart systemd-journald
    - Restart rsyslog
  when: baseline_enable_journald_syslog_forwarding | bool

- name: Apply audit and logging services on real hosts
  block:
    - name: Ensure rsyslog is enabled and started on real hosts
      ansible.builtin.systemd:
        name: rsyslog
        enabled: true
        state: started

    - name: Ensure AppArmor is enabled and started on real hosts
      ansible.builtin.systemd:
        name: apparmor
        enabled: true
        state: started

    - name: Ensure AppArmor profiles are in enforce mode
      ansible.builtin.shell: |
        set -eu
        find /etc/apparmor.d -maxdepth 1 -type f ! -name 'README' -print0 | xargs -0r aa-enforce
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure auditd is enabled and started on real hosts
      ansible.builtin.systemd:
        name: auditd
        enabled: true
        state: started
      when: os_auditd_enabled | bool

    - name: Configure audit rules for Docker and privileged configuration paths
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/99-vps-scaffold.rules
        owner: root
        group: root
        mode: "0640"
        content: |
          -w /usr/bin/docker -p wa -k docker
          -w /usr/bin/containerd -p wa -k docker
          -w /usr/bin/runc -p wa -k docker
          -w /etc/docker -p wa -k docker
          -w /var/lib/docker -p wa -k docker
          -w /etc/ssh/sshd_config -p wa -k sshd
          -w /etc/ssh/sshd_config.d -p wa -k sshd
          -w /etc/sudoers -p wa -k scope
          -w /etc/sudoers.d -p wa -k scope
      notify: Restart auditd
      when: os_auditd_enabled | bool
  when: ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']

- name: Check whether an AIDE database already exists
  ansible.builtin.stat:
    path: /var/lib/aide/aide.db
  register: aide_db_file
  when:
    - baseline_enable_aide | bool
    - ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']

- name: Check whether a compressed AIDE database already exists
  ansible.builtin.stat:
    path: /var/lib/aide/aide.db.gz
  register: aide_db_gz_file
  when:
    - baseline_enable_aide | bool
    - ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']

- name: Initialize AIDE database on first run
  ansible.builtin.shell: |
    set -eu
    aideinit --yes
    if [ -f /var/lib/aide/aide.db.new ]; then
      cp /var/lib/aide/aide.db.new /var/lib/aide/aide.db
    fi
    if [ -f /var/lib/aide/aide.db.new.gz ]; then
      cp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
    fi
  when:
    - baseline_enable_aide | bool
    - baseline_initialize_aide_database | bool
    - ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']
    - not aide_db_file.stat.exists
    - not aide_db_gz_file.stat.exists

- name: Create grub drop-in directory
  ansible.builtin.file:
    path: /etc/default/grub.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure AppArmor at boot via grub drop-in
  ansible.builtin.copy:
    dest: /etc/default/grub.d/99-vps-scaffold-apparmor.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX apparmor=1 security=apparmor"
  notify: Update grub
  when:
    - baseline_enable_apparmor_boot | bool
    - ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']

- name: Ensure modprobe.d directory exists
  ansible.builtin.file:
    path: /etc/modprobe.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable rarely used kernel modules
  ansible.builtin.copy:
    dest: "/etc/modprobe.d/{{ item }}.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      install {{ item }} /bin/false
      blacklist {{ item }}
  loop: "{{ baseline_disabled_kernel_modules }}"

- name: Configure systemd-timesyncd NTP servers in main config
  ansible.builtin.blockinfile:
    path: /etc/systemd/timesyncd.conf
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK: vps-scaffold timesyncd"
    insertafter: '^\[Time\]'
    block: |
      NTP={{ baseline_timesyncd_ntp_servers | join(' ') }}
      FallbackNTP={{ baseline_timesyncd_fallback_ntp_servers | join(' ') }}

- name: Configure strong SSH MACs in a dedicated drop-in
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/00-vps-scaffold-hardening.conf
    owner: root
    group: root
    mode: "0600"
    content: |
      MACs {{ ssh_macs | join(',') }}

- name: Enable and start systemd-timesyncd on real hosts
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']
