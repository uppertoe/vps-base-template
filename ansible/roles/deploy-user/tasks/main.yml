---
- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Add SSH public key to authorized_keys
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ deploy_user_public_key }}"
    state: present
    exclusive: true  # only this key — remove all others

- name: Grant passwordless sudo to deploy user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"  # validates syntax before writing

- name: Create deploy directory for docker projects
  ansible.builtin.file:
    path: /opt/deploy
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Install deploy script to home directory
  ansible.builtin.copy:
    src: deploy
    dest: "/home/{{ deploy_user }}/deploy"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
