---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  tags: molecule-notest  # apt operations in containers are OOM-prone; Docker install is not meaningful to test in Docker

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: molecule-notest

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  tags: molecule-notest

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
  tags: molecule-notest

- name: Install Docker CE and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  tags: molecule-notest

- name: Create /etc/docker directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_config | to_nice_json }}\n"
    mode: "0644"
  notify: Restart docker

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  # Skip inside Docker containers (Molecule) — Docker-in-Docker is fragile
  when: ansible_virtualization_type not in ['docker', 'container']

- name: Deploy docker-prune systemd service
  ansible.builtin.copy:
    src: docker-prune.service
    dest: /etc/systemd/system/docker-prune.service
    mode: "0644"

- name: Deploy docker-prune systemd timer
  ansible.builtin.copy:
    src: docker-prune.timer
    dest: /etc/systemd/system/docker-prune.timer
    mode: "0644"

- name: Enable and start docker-prune timer
  ansible.builtin.systemd:
    name: docker-prune.timer
    enabled: true
    state: started
    daemon_reload: true
  when: ansible_virtualization_type not in ['docker', 'container']

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
