---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Set default routed policy to deny
  community.general.ufw:
    direction: routed
    policy: deny

- name: Allow loopback traffic in
  community.general.ufw:
    rule: allow
    direction: in
    interface: lo

- name: Allow loopback traffic out
  community.general.ufw:
    rule: allow
    direction: out
    interface: lo

- name: Deny spoofed IPv4 loopback traffic
  community.general.ufw:
    rule: deny
    direction: in
    from_ip: 127.0.0.0/8

- name: Deny spoofed IPv6 loopback traffic
  community.general.ufw:
    rule: deny
    direction: in
    from_ip: "::1"

- name: Allow TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_allowed_udp_ports }}"

- name: Enable ufw (non-destructive — existing SSH session is preserved)
  community.general.ufw:
    state: enabled
