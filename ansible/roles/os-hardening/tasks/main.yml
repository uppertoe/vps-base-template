---
# Thin wrapper around the dev-sec.io os_hardening role.
# Skipped automatically inside Docker containers (Molecule tests) because
# kernel-level settings (sysctl) cannot be changed in unprivileged containers.
# On a real VPS these all apply.
#
# See: https://github.com/dev-sec/ansible-collection-hardening/blob/master/roles/os_hardening/README.md

- name: Apply OS hardening via dev-sec.io
  ansible.builtin.include_role:
    name: devsec.hardening.os_hardening
  when: ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']

- name: Enable kernel memory overcommit for Redis-style workloads
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: "1"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-vps-scaffold.conf
  when:
    - host_vm_overcommit_memory_enabled | bool
    - not molecule_test | default(false) | bool
    - ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']

- name: Lock root password
  ansible.builtin.user:
    name: root
    password_lock: "{{ lock_root_password }}"

- name: Remove auditd when host auditing is disabled
  ansible.builtin.apt:
    name: auditd
    state: absent
    purge: true
    autoremove: true
  when:
    - not os_auditd_enabled | bool
    - ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']
