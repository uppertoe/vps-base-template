---
# Thin wrapper around the dev-sec.io ssh_hardening role.
# Variables are set in group_vars/all.yml and passed through automatically.
# See: https://github.com/dev-sec/ansible-collection-hardening/blob/master/roles/ssh_hardening/README.md

- name: Apply SSH hardening via dev-sec.io
  ansible.builtin.include_role:
    name: devsec.hardening.ssh_hardening

- name: Install SSH login banner
  ansible.builtin.copy:
    dest: /etc/issue.net
    owner: root
    group: root
    mode: "0644"
    content: |
      Authorized uses only. Activity may be monitored and reported.

- name: Restart SSH to apply banner updates
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  when: ansible_facts['virtualization_type'] not in ['docker', 'container', 'lxc']
