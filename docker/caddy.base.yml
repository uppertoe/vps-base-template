---
# caddy.base.yml — base Caddy service definition
#
# Included by server repos via:
#
#   include:
#     - scaffold/docker/caddy.base.yml
#
# Caddy discovers routing automatically by appending all *.caddy files
# from apps/*/ at container startup. Adding an app requires no changes to
# this file or the Caddyfile — just drop a .caddy file in the app directory.
#
# Environment variables (from server .env):
#   DOMAIN      → primary domain, available as {$DOMAIN} in caddy snippets
#   ACME_EMAIL  → Let's Encrypt registration email (optional)

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    read_only: true
    mem_limit: 256m
    pids_limit: 256
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      # Mount repo root so the glob can reach apps/*/*.caddy
      - ../..:/srv/repo:ro
      # Caddyfile mounted explicitly for clarity
      - ../../Caddyfile:/etc/caddy/Caddyfile:ro
      - ./run-caddy.sh:/usr/local/bin/run-caddy.sh:ro
      - caddy_data:/data          # TLS certs — persisted across restarts
      - caddy_config:/config      # Autosave + runtime config cache
      - caddy_logs:/var/log/caddy
    tmpfs:
      - /tmp
    networks:
      - caddy
    environment:
      - DOMAIN=${DOMAIN}
    command: ["/bin/sh", "/usr/local/bin/run-caddy.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2019/config/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

networks:
  caddy:
    name: caddy  # fixed name so app containers can join it

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
