---
# converge.yml — applies all roles to the test container
#
# Uses a fixture SSH key path so Molecule exercises the same
# ansible_ssh_private_key_file -> .pub lookup used during real provisioning.

- name: Converge
  hosts: all
  gather_facts: true
  become: true
  serial: 1
  vars:
    ansible_ssh_private_key_file: "{{ playbook_dir }}/fixtures/id_ed25519_molecule"
  pre_tasks:
    - name: Mark this as a Molecule test run (disables kernel-level hardening)
      ansible.builtin.set_fact:
        molecule_test: true
  roles:
    - role: common
    - role: deploy-user
    - role: ssh-hardening
    - role: os-hardening
    - role: baseline-hardening
    - role: docker
    - role: firewall
