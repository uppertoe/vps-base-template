---
# prepare.yml — runs before converge, ensures Python is available for Ansible
# This is needed for minimal base images that don't include Python.

- name: Prepare
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Install python3
      ansible.builtin.raw: apt-get update && apt-get install -y python3
      changed_when: false
