---
# verify.yml — asserts the expected post-state of the server
# Run standalone with: molecule verify

- name: Verify
  hosts: all
  gather_facts: true
  become: true
  tasks:

    # -------------------------------------------------------------------------
    # Deploy user
    # -------------------------------------------------------------------------
    - name: Gather deploy user info
      ansible.builtin.getent:
        database: passwd
        key: deploy
      register: deploy_user_info

    - name: Assert deploy user exists
      ansible.builtin.assert:
        that:
          - "'deploy' in deploy_user_info.ansible_facts.getent_passwd"
        msg: "deploy user was not created"

    - name: Check deploy user authorized_keys
      ansible.builtin.stat:
        path: /home/deploy/.ssh/authorized_keys
      register: auth_keys

    - name: Assert authorized_keys exists
      ansible.builtin.assert:
        that:
          - auth_keys.stat.exists
          - auth_keys.stat.pw_name == 'deploy'
          - auth_keys.stat.gr_name == 'deploy'
          - auth_keys.stat.mode == '0600'
        msg: "authorized_keys file not found for deploy user"

    - name: Read deploy user authorized_keys
      ansible.builtin.slurp:
        src: /home/deploy/.ssh/authorized_keys
      register: deploy_authorized_keys_raw

    - name: Assert deploy user authorized_keys contains the fixture key
      ansible.builtin.assert:
        that:
          - >-
            'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFakeKeyFromFixtureForMolecule
            molecule-fixture' in (deploy_authorized_keys_raw.content | b64decode)
        msg: "deploy user authorized_keys does not contain the configured fixture public key"

    - name: Check deploy sudoers file
      ansible.builtin.stat:
        path: /etc/sudoers.d/deploy
      register: sudoers_file

    - name: Assert deploy sudoers file exists
      ansible.builtin.assert:
        that:
          - sudoers_file.stat.exists
          - sudoers_file.stat.pw_name == 'root'
          - sudoers_file.stat.gr_name == 'root'
          - sudoers_file.stat.mode == '0440'
        msg: "sudoers file for deploy user not found"

    - name: Read deploy sudoers file
      ansible.builtin.slurp:
        src: /etc/sudoers.d/deploy
      register: deploy_sudoers_raw

    - name: Assert deploy sudoers grants passwordless sudo
      ansible.builtin.assert:
        that:
          - >-
            'deploy ALL=(ALL) NOPASSWD:ALL' in (deploy_sudoers_raw.content | b64decode)
        msg: "deploy sudoers does not grant expected passwordless sudo access"

    # -------------------------------------------------------------------------
    # SSH hardening
    # -------------------------------------------------------------------------
    - name: Read SSH config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config
      register: sshd_config_raw

    - name: Set sshd_config content fact
      ansible.builtin.set_fact:
        sshd_config: "{{ sshd_config_raw.content | b64decode }}"

    - name: Check for sshd_config.d includes (modern systems split config)
      ansible.builtin.find:
        paths: /etc/ssh/sshd_config.d
        patterns: "*.conf"
      register: sshd_config_d
      failed_when: false

    - name: Read sshd_config.d files if present
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ sshd_config_d.files | default([]) }}"
      register: sshd_config_d_raw
      when: sshd_config_d.files is defined and sshd_config_d.files | length > 0

    - name: Assert PasswordAuthentication is disabled
      ansible.builtin.assert:
        that:
          - >-
            'PasswordAuthentication no' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'PasswordAuthentication no') | list | length > 0)
        msg: "SSH password authentication is not disabled"

    - name: Assert root SSH login is disabled
      ansible.builtin.assert:
        that:
          - >-
            'PermitRootLogin no' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'PermitRootLogin no') | list | length > 0)
        msg: "SSH root login is not disabled"

    - name: Assert SSH access is restricted to the deploy user
      ansible.builtin.assert:
        that:
          - >-
            'AllowUsers deploy' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'AllowUsers deploy') | list | length > 0)
        msg: "SSH is not restricted to the deploy user"

    - name: Assert SSH client alive count is tightened
      ansible.builtin.assert:
        that:
          - >-
            'ClientAliveCountMax 3' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'ClientAliveCountMax 3') | list | length > 0)
        msg: "SSH ClientAliveCountMax is not tightened to 3"

    - name: Assert SSH client alive interval is tightened
      ansible.builtin.assert:
        that:
          - >-
            'ClientAliveInterval 300' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'ClientAliveInterval 300') | list | length > 0)
        msg: "SSH ClientAliveInterval is not tightened to 300"

    - name: Assert SSH max sessions is tightened
      ansible.builtin.assert:
        that:
          - >-
            'MaxSessions 2' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'MaxSessions 2') | list | length > 0)
        msg: "SSH MaxSessions is not tightened to 2"

    - name: Assert SSH max auth retries is tightened
      ansible.builtin.assert:
        that:
          - >-
            'MaxAuthTries 3' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'MaxAuthTries 3') | list | length > 0)
        msg: "SSH MaxAuthTries is not tightened to 3"

    - name: Assert SSH login grace time is tightened
      ansible.builtin.assert:
        that:
          - >-
            'LoginGraceTime 60' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'LoginGraceTime 60') | list | length > 0)
        msg: "SSH LoginGraceTime is not tightened to 60"

    - name: Assert SSH log level is INFO
      ansible.builtin.assert:
        that:
          - >-
            'LogLevel INFO' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'LogLevel INFO') | list | length > 0)
        msg: "SSH LogLevel is not set to INFO"

    - name: Assert SSH banner is enabled
      ansible.builtin.assert:
        that:
          - >-
            'Banner /etc/issue.net' in sshd_config or
            (sshd_config_d_raw.results | default([]) |
             map(attribute='content') | map('b64decode') |
             select('search', 'Banner /etc/issue.net') | list | length > 0)
        msg: "SSH banner is not enabled"

    - name: Check SSH banner file exists
      ansible.builtin.stat:
        path: /etc/issue.net
      register: ssh_banner_file

    - name: Assert SSH banner file exists
      ansible.builtin.assert:
        that:
          - ssh_banner_file.stat.exists
          - ssh_banner_file.stat.mode == '0644'
        msg: "SSH banner file is missing or has unexpected permissions"

    - name: Read root shadow entry
      ansible.builtin.getent:
        database: shadow
        key: root

    - name: Assert root password is locked
      ansible.builtin.assert:
        that:
          - ansible_facts.getent_shadow.root[0] is match('^[!*]')
        msg: "root password is not locked"

    # -------------------------------------------------------------------------
    # Baseline hardening
    # -------------------------------------------------------------------------
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert libpam-pwquality is installed
      ansible.builtin.assert:
        that:
          - "'libpam-pwquality' in ansible_facts.packages"
        msg: "libpam-pwquality is not installed"

    - name: Assert apparmor-utils is installed
      ansible.builtin.assert:
        that:
          - "'apparmor-utils' in ansible_facts.packages"
        msg: "apparmor-utils is not installed"

    - name: Check pwquality config exists
      ansible.builtin.stat:
        path: /etc/security/pwquality.conf
      register: pwquality_config

    - name: Assert pwquality config exists
      ansible.builtin.assert:
        that:
          - pwquality_config.stat.exists
        msg: "pwquality config was not deployed"

    - name: Read pwquality config
      ansible.builtin.slurp:
        src: /etc/security/pwquality.conf
      register: pwquality_config_raw

    - name: Assert pwquality config includes CIS-style settings
      ansible.builtin.assert:
        that:
          - "'enforcing = 1' in (pwquality_config_raw.content | b64decode)"
          - "'dictcheck = 1' in (pwquality_config_raw.content | b64decode)"
          - "'minlen = 14' in (pwquality_config_raw.content | b64decode)"
        msg: "pwquality config is missing expected settings"

    - name: Check PAM faillock profile exists
      ansible.builtin.stat:
        path: /etc/security/faillock.conf
      register: pam_faillock_profile

    - name: Assert PAM faillock profile exists
      ansible.builtin.assert:
        that:
          - pam_faillock_profile.stat.exists
        msg: "faillock config was not deployed"

    - name: Read faillock config
      ansible.builtin.slurp:
        src: /etc/security/faillock.conf
      register: faillock_config_raw

    - name: Assert faillock config uses expected values
      ansible.builtin.assert:
        that:
          - "'deny = 4' in (faillock_config_raw.content | b64decode)"
          - "'fail_interval = 900' in (faillock_config_raw.content | b64decode)"
          - "'unlock_time = 900' in (faillock_config_raw.content | b64decode)"
        msg: "faillock config is missing expected values"

    - name: Check session hardening profile exists
      ansible.builtin.stat:
        path: /etc/profile.d/99-vps-scaffold-session.sh
      register: session_profile

    - name: Assert session hardening profile exists
      ansible.builtin.assert:
        that:
          - session_profile.stat.exists
        msg: "session hardening profile was not deployed"

    - name: Read session hardening profile
      ansible.builtin.slurp:
        src: /etc/profile.d/99-vps-scaffold-session.sh
      register: session_profile_raw

    - name: Assert session hardening profile configures TMOUT and umask
      ansible.builtin.assert:
        that:
          - "'umask 027' in (session_profile_raw.content | b64decode)"
          - "'export TMOUT=900' in (session_profile_raw.content | b64decode)"
        msg: "session hardening profile does not configure umask/TMOUT"

    - name: Read /etc/profile
      ansible.builtin.slurp:
        src: /etc/profile
      register: etc_profile_raw

    - name: Assert /etc/profile configures TMOUT and umask
      ansible.builtin.assert:
        that:
          - "'umask 027' in (etc_profile_raw.content | b64decode)"
          - "'export TMOUT=900' in (etc_profile_raw.content | b64decode)"
        msg: "/etc/profile does not configure umask/TMOUT"

    - name: Read /etc/bash.bashrc
      ansible.builtin.slurp:
        src: /etc/bash.bashrc
      register: bash_bashrc_raw

    - name: Assert /etc/bash.bashrc configures umask
      ansible.builtin.assert:
        that:
          - "'umask 027' in (bash_bashrc_raw.content | b64decode)"
        msg: "/etc/bash.bashrc does not configure umask"

    - name: Read /etc/default/useradd
      ansible.builtin.slurp:
        src: /etc/default/useradd
      register: useradd_defaults_raw

    - name: Assert default inactive days are configured
      ansible.builtin.assert:
        that:
          - "'INACTIVE=30' in (useradd_defaults_raw.content | b64decode)"
        msg: "default inactive password lock is not configured"

    - name: Check allow-list files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/at.allow
        - /etc/cron.allow
      register: allow_files

    - name: Assert allow-list files are locked down
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.mode == '0640'
        msg: "{{ item.stat.path }} is missing or too permissive"
      loop: "{{ allow_files.results }}"

    - name: Check sudo logging drop-in exists
      ansible.builtin.stat:
        path: /etc/sudoers.d/01-vps-scaffold-logging
      register: sudo_logging_dropin

    - name: Assert sudo logging drop-in exists
      ansible.builtin.assert:
        that:
          - sudo_logging_dropin.stat.exists
          - sudo_logging_dropin.stat.mode == '0440'
        msg: "sudo logging drop-in is missing"

    - name: Read sudo logging drop-in
      ansible.builtin.slurp:
        src: /etc/sudoers.d/01-vps-scaffold-logging
      register: sudo_logging_dropin_raw

    - name: Assert sudo logging is configured
      ansible.builtin.assert:
        that:
          - "'Defaults logfile=\"/var/log/sudo.log\"' in (sudo_logging_dropin_raw.content | b64decode)"
          - "'Defaults use_pty' in (sudo_logging_dropin_raw.content | b64decode)"
          - "'Defaults timestamp_timeout=0' in (sudo_logging_dropin_raw.content | b64decode)"
        msg: "sudo logging is not configured"

    - name: Check timesyncd config exists
      ansible.builtin.stat:
        path: /etc/systemd/timesyncd.conf
      register: timesyncd_config

    - name: Assert timesyncd config exists
      ansible.builtin.assert:
        that:
          - timesyncd_config.stat.exists
        msg: "timesyncd config was not deployed"

    - name: Read timesyncd config
      ansible.builtin.slurp:
        src: /etc/systemd/timesyncd.conf
      register: timesyncd_config_raw

    - name: Assert timesyncd config includes NTP servers
      ansible.builtin.assert:
        that:
          - "'NTP=time.cloudflare.com time.google.com' in (timesyncd_config_raw.content | b64decode)"
          - "'FallbackNTP=0.pool.ntp.org 1.pool.ntp.org' in (timesyncd_config_raw.content | b64decode)"
        msg: "timesyncd config is missing expected NTP settings"

    # -------------------------------------------------------------------------
    # Docker
    # Note: Docker CE installation is skipped in Molecule (molecule-notest tag)
    # because installing Docker-in-Docker is OOM-prone and not meaningful to test.
    # Verify on a real VPS with: ansible-playbook ... && docker --version
    # Here we verify: docker group exists, daemon.json is deployed, user is in group.
    # -------------------------------------------------------------------------
    - name: Check docker group exists
      ansible.builtin.getent:
        database: group
        key: docker
      register: docker_group_check
      failed_when: false

    - name: Assert docker group exists
      ansible.builtin.assert:
        that:
          - docker_group_check.ansible_facts.getent_group is defined
          - "'docker' in docker_group_check.ansible_facts.getent_group"
        msg: "docker group was not created — docker CE install may have been skipped"

    - name: Check Docker daemon.json exists
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: daemon_json

    - name: Assert daemon.json exists
      ansible.builtin.assert:
        that:
          - daemon_json.stat.exists
        msg: "/etc/docker/daemon.json not found — daemon is unconfigured"

    - name: Read daemon.json
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: daemon_json_raw

    - name: Assert live-restore is enabled in daemon.json
      ansible.builtin.assert:
        that:
          - (daemon_json_raw.content | b64decode | from_json)['live-restore'] == true
        msg: "live-restore is not enabled in daemon.json"

    - name: Assert Docker inter-container communication is disabled by default
      ansible.builtin.assert:
        that:
          - (daemon_json_raw.content | b64decode | from_json)['icc'] == false
        msg: "Docker daemon does not disable inter-container communication"

    - name: Assert Docker userland proxy is disabled
      ansible.builtin.assert:
        that:
          - (daemon_json_raw.content | b64decode | from_json)['userland-proxy'] == false
        msg: "Docker daemon does not disable the userland proxy"

    - name: Check deploy user is in docker group
      ansible.builtin.command: id deploy
      register: deploy_id
      changed_when: false

    - name: Assert deploy user is in docker group
      ansible.builtin.assert:
        that:
          - "'docker' in deploy_id.stdout"
        msg: "deploy user is not in the docker group"

    # -------------------------------------------------------------------------
    # Firewall
    # -------------------------------------------------------------------------
    - name: Check ufw is installed
      ansible.builtin.stat:
        path: /usr/sbin/ufw
      register: ufw_bin

    - name: Assert ufw is installed
      ansible.builtin.assert:
        that:
          - ufw_bin.stat.exists
        msg: "ufw is not installed"

    - name: Check ufw status
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Assert ufw is active
      ansible.builtin.assert:
        that:
          - "'active' in ufw_status.stdout"
        msg: "ufw firewall is not active. Status: {{ ufw_status.stdout }}"

    - name: Assert ufw allows expected ports
      ansible.builtin.assert:
        that:
          - "'22/tcp' in ufw_status.stdout"
          - "'80/tcp' in ufw_status.stdout"
          - "'443/tcp' in ufw_status.stdout"
          - "'443/udp' in ufw_status.stdout"
        msg: "ufw is active but expected ports are not all present. Status: {{ ufw_status.stdout }}"

    # -------------------------------------------------------------------------
    # Deploy directory
    # -------------------------------------------------------------------------
    - name: Check /opt/deploy exists and is owned by deploy user
      ansible.builtin.stat:
        path: /opt/deploy
      register: deploy_dir

    - name: Assert /opt/deploy exists
      ansible.builtin.assert:
        that:
          - deploy_dir.stat.exists
          - deploy_dir.stat.isdir
          - deploy_dir.stat.pw_name == 'deploy'
          - deploy_dir.stat.gr_name == 'deploy'
        msg: "/opt/deploy directory missing or not owned by deploy user"

    - name: Check deploy helper script exists
      ansible.builtin.stat:
        path: /home/deploy/deploy
      register: deploy_helper

    - name: Assert deploy helper script exists and is executable
      ansible.builtin.assert:
        that:
          - deploy_helper.stat.exists
          - deploy_helper.stat.pw_name == 'deploy'
          - deploy_helper.stat.gr_name == 'deploy'
          - deploy_helper.stat.mode == '0755'
        msg: "deploy helper script is missing or has unexpected ownership/permissions"

    # -------------------------------------------------------------------------
    # fail2ban SSH jail
    # -------------------------------------------------------------------------
    - name: Check fail2ban SSH jail config exists
      ansible.builtin.stat:
        path: /etc/fail2ban/jail.d/ssh.conf
      register: fail2ban_ssh

    - name: Assert fail2ban SSH jail config exists
      ansible.builtin.assert:
        that:
          - fail2ban_ssh.stat.exists
        msg: "fail2ban SSH jail config not found at /etc/fail2ban/jail.d/ssh.conf"

    - name: Read fail2ban SSH jail config
      ansible.builtin.slurp:
        src: /etc/fail2ban/jail.d/ssh.conf
      register: fail2ban_ssh_raw

    - name: Assert fail2ban SSH jail is enabled
      ansible.builtin.assert:
        that:
          - "'enabled  = true' in (fail2ban_ssh_raw.content | b64decode)"
        msg: "fail2ban SSH jail is not enabled"

    # -------------------------------------------------------------------------
    # Docker prune timer
    # -------------------------------------------------------------------------
    - name: Check docker-prune service unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/docker-prune.service
      register: prune_service

    - name: Assert docker-prune service unit exists
      ansible.builtin.assert:
        that:
          - prune_service.stat.exists
        msg: "docker-prune.service unit not found"

    - name: Check docker-prune timer unit exists
      ansible.builtin.stat:
        path: /etc/systemd/system/docker-prune.timer
      register: prune_timer

    - name: Assert docker-prune timer unit exists
      ansible.builtin.assert:
        that:
          - prune_timer.stat.exists
        msg: "docker-prune.timer unit not found"
